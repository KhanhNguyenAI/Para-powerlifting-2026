    <div class="practice-game-container">
      <!-- Header -->
      <div class="practice-game-header">
        <button
          class="back-btn"
          onclick="location.href='../practice.html'"
          aria-label="戻る"
        >
          <span class="back-icon">←</span>
          <span class="back-text">戻る</span>
        </button>
        <h1 class="practice-game-title">1タップ速度測定</h1>
      </div>

      <!-- Stats Container -->
      <div class="practice-stats-container">
        <div class="stat-box">
          <div class="stat-label">タップ回数</div>
          <div class="stat-value" id="tap-count">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">最速時間</div>
          <div class="stat-value" id="best-time">---</div>
          <div class="stat-unit">ms</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">平均時間</div>
          <div class="stat-value" id="average-time">---</div>
          <div class="stat-unit">ms</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">現在の時間</div>
          <div class="stat-value" id="current-time">---</div>
          <div class="stat-unit">ms</div>
        </div>
      </div>

      <!-- Practice Area -->
      <div class="practice-area" id="practice-area">
        <div class="practice-instruction" id="instruction">
          タップエリアをクリックして開始
        </div>
        <div class="tap-indicator" id="tap-indicator" style="display: none;">
          👆
        </div>
      </div>

      <!-- Result Panel -->
      <div class="result-panel" id="result-panel" style="display: none;">
        <h2 class="result-title" id="result-title">測定結果</h2>
        <div class="result-stats">
          <div class="result-stat">
            <span class="result-stat-label">タップ回数</span>
            <span class="result-stat-value" id="final-tap-count">0 回</span>
          </div>
          <div class="result-stat">
            <span class="result-stat-label">最速時間</span>
            <span class="result-stat-value" id="final-best-time">---</span>
          </div>
          <div class="result-stat">
            <span class="result-stat-label">平均時間</span>
            <span class="result-stat-value" id="final-average-time">---</span>
          </div>
        </div>
        <div>
          <button class="restart-btn" id="restart-btn">もう一度</button>
          <button class="back-to-menu-btn" id="back-to-menu-btn">メニューに戻る</button>
        </div>

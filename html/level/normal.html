        s.parentNode.insertBefore(g, s);
      })();

  <body>

          class="sidebar-logo"
        />
        <div class="sidebar-title">Parapower</div>
      </div>

      <div class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">メインメニュー</div>
          <a href="../../index.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span class="nav-text">ホーム</span>
          </a>
          <a href="../level.html" class="nav-item">
            <span class="nav-icon">🎮</span>
            <span class="nav-text">競技判定疑似体験</span>
          </a>
          <a href="../judge.html" class="nav-item">
            <span class="nav-icon">⚖️</span>
            <span class="nav-text">判定を予想しよう</span>
          </a>
          <a href="../rule.html" class="nav-item">
            <span class="nav-icon">📖</span>
            <span class="nav-text">ルール・遊び方</span>
          </a>
        </div>

        <div class="nav-divider"></div>

        <div class="nav-section">
          <div class="nav-section-title">その他</div>
          <a href="../credit.html" class="nav-item">
            <span class="nav-icon">ℹ️</span>
            <span class="nav-text">クレジット</span>
          </a>
          <a
            href="https://jppf.jp/index"
            target="_blank"
            class="nav-item external"

          </a>
          <a
            href="https://twitter.com/ai_hac_neec"

      </div>

    <div class="game-container" data-difficulty="normal">
      <!-- Header Stats -->
      <div class="game-header">
        <div class="stats-row">
          <div class="stat-item">
            <div class="stat-label">リフト回数</div>
            <div id="counter" class="stat-value">0</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">残り時間</div>
            <div id="result2" class="stat-value timer-value">10</div>
            <div class="timer-unit">秒</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">目標</div>
            <div class="stat-value target-value">75</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">タップ速度</div>
            <div id="tap-speed" class="stat-value speed-value">0</div>
            <div class="timer-unit">回/秒</div>
          </div>
        </div>
      </div>

      <!-- Combo Display -->
      <div id="combo-display" class="combo-display">
        <div class="combo-label">COMBO</div>
        <div id="combo-count" class="combo-count">0</div>
        <div id="combo-multiplier" class="combo-multiplier">x1.0</div>
      </div>

      <!-- Time Warning -->
      <div id="time-warning" class="time-warning">
        <div class="warning-text">残り時間が少ない！</div>
      </div>

      <!-- Game Area -->
      <div class="game-area">
        <!-- Background Canvas for Gauge -->
        <canvas id="bar" class="gauge-canvas"></canvas>

        <!-- Character Container with 3D effects -->
        <div class="character-wrapper">
          <div class="character-3d-container">
            <img
              src="../../images/characters/G023G1672_sozai_mizukitakekawa_01.png"
              id="character"
              alt="Character"
              class="character-img"
            />
            <div class="character-glow"></div>
          </div>
        </div>

        <!-- Progress Gauge Visual -->
        <div class="progress-container">
          <div class="progress-bar-wrapper">
            <div id="progress-bar" class="progress-bar-fill"></div>
            <div class="progress-bar-glow"></div>
          </div>
          <div class="progress-text">
            <span id="progress-percent">0%</span>
          </div>
        </div>

        <!-- Instruction Text -->
        <div class="instruction-panel">
          <p class="instruction-text">バーを上げるつもりで連続タップ！</p>
          <div class="tap-indicator">
            <span class="tap-icon">👆</span>
            <span class="tap-text">タップ！</span>
          </div>
        </div>

        <!-- Particle Effects Container -->
        <div id="particles-container" class="particles-container"></div>

        <!-- Floating Cheering Messages -->
        <div class="cheering-messages">
          <div class="cheering-msg" style="--delay: 2s">頑張れ！</div>
          <div class="cheering-msg" style="--delay: 4s">ファイト！</div>
          <div class="cheering-msg" style="--delay: 6s">いいぞ！</div>
          <div class="cheering-msg" style="--delay: 8s">すごい！</div>
          <div class="cheering-msg" style="--delay: 10s">その調子！</div>
        </div>
      </div>

      <!-- Tap Feedback -->
      <div id="tap-feedback" class="tap-feedback"></div>
    </div>

    <script src="../../javascript/level/normal.js"></script>
    <script src="../../javascript/sidebar.js"></script>
  </body>
</html>
